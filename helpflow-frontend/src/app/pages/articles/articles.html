<div class="articles-page">
    <div class="introduction">
        <div class="introduction-content">
            <h1>Welcome to the Articles Page</h1>
            <p>Browse knowledge base articles and open any card to read full content.</p>
        </div>
    </div>

    <input type="text" 
        placeholder="Filter by category or title..." 
        class="filter-input" 
        (input)="searchTerm.set($any($event.target).value)" 
    />

    <p *ngIf="loading()">Loading articles...</p>
    <p *ngIf="error()">{{ error() }}</p>

    <a class="article-card" *ngFor="let article of filteredArticles()" [routerLink]="['/articles', article.article_id]">
        <h3 class="article-title">{{ article.categoryName || "Uncategorized" }} - {{ article.title }}</h3>
    </a>
</div>
