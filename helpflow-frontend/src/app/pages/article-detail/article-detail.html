<div class="article-detail-page">

    <p *ngIf="loading()">Loading article...</p>
    <p *ngIf="error()">{{ error() }}</p>

    <article *ngIf="!loading() && !error() && article() as a">
        <div class="article-header">
            <div class="article-eyebrow">
                <h1>{{ a.title }}</h1>
                <p><strong>Author:</strong> {{ "Currently unknown" }}</p>
                <p><strong>Category:</strong> {{ a.categoryName || "Uncategorized" }}</p>
                <p><strong>Created:</strong> {{ a.createdAt | date:'short' }}</p>
                <p><strong>Updated:</strong> {{ a.updatedAt | date:'short' }}</p>
            </div>
            <a routerLink="/articles" class="back-link">← Back to Articles</a>
        </div>
        <br />
        <hr />
        <br />
        <div class="article-content article-formatted">
            {{ getFormattedContent(a.content) }}
        </div>
    </article>
</div>
