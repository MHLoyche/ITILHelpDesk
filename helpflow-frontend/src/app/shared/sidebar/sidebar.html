<aside class="sidebar" [class.open]="open()">
  <div class="sidebar-title-container">
    <h2 class="sidebar-title">HelpFlow</h2>
    <span class="sidebar-sub-title">ITIL Desk</span>
  </div>

  <button class="sidebar-close" aria-label="Close menu" (click)="open.set(false)">✕</button>

  <nav class="sidebar-section" aria-label="Primary">
    <a routerLink="/dashboard" routerLinkActive="is-active" class="sidebar-link" [routerLinkActiveOptions]="{ exact: true }">
      <span class="sidebar-label">📊 Dashboard</span>
    </a>

    <a routerLink="/tickets" routerLinkActive="is-active" class="sidebar-link">
      <span class="sidebar-label">📋 Tickets</span>
    </a>

    <a routerLink="/articles" routerLinkActive="is-active" class="sidebar-link">
      <span class="sidebar-label">📚 Articles</span>
    </a>

    <a *ngIf="isSupporter()" routerLink="/sla-management" routerLinkActive="is-active" class="sidebar-link">
      <span class="sidebar-label">📈 SLA Management</span>
    </a>

    <!-- Reports removed -->

    <a routerLink="/contact" routerLinkActive="is-active" class="sidebar-link">
      <span class="sidebar-label">✉️ Contact</span>
    </a>
  </nav>

  <section class="sidebar-profile" aria-label="Profile role switch">
    <div class="profile-meta">
      <div class="profile-avatar">{{ isSupporter() ? "SP" : "UP" }}</div>
      <div>
        <p class="profile-name">{{ isSupporter() ? "Supporter Profile" : "User Profile" }}</p>
        <p class="profile-sub">Access mode</p>
      </div>
    </div>

    <div class="role-toggle">
      <button
        type="button"
        class="role-btn"
        [class.active]="role() === 'user'"
        (click)="setRole('user')"
      >
        User
      </button>

      <button
        type="button"
        class="role-btn"
        [class.active]="role() === 'supporter'"
        (click)="setRole('supporter')"
      >
        Supporter
      </button>
    </div>
  </section>
</aside>
